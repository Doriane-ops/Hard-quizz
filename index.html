
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1.5rem 0;font-family:var(--font-sans)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.header-left{font-size:13px;color:var(--color-text-secondary)}
.timer{font-size:13px;font-weight:500;color:var(--color-text-primary);background:var(--color-background-secondary);padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-tertiary)}
.timer.warn{color:#A32D2D}
.prog-bg{height:3px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:1.5rem}
.prog-fill{height:3px;background:#534AB7;border-radius:2px;transition:width .4s}
.domain-badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:.75rem}
.q-type{font-size:11px;color:var(--color-text-secondary);margin-bottom:.4rem;font-style:italic}
.q-text{font-size:15px;font-weight:500;color:var(--color-text-primary);line-height:1.65;margin-bottom:.5rem}
.q-note{font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem;line-height:1.5;padding:8px 12px;background:var(--color-background-secondary);border-left:3px solid var(--color-border-secondary);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:11px 14px;text-align:left;cursor:pointer;font-size:14px;color:var(--color-text-primary);transition:background .12s;display:flex;gap:10px;align-items:flex-start;line-height:1.5}
.opt:hover:not(:disabled){background:var(--color-background-secondary)}
.opt .ltr{font-weight:500;min-width:16px;color:var(--color-text-secondary);flex-shrink:0}
.opt.correct{background:#EAF3DE;border-color:#639922}
.opt.correct .ltr{color:#3B6D11}
.opt.wrong{background:#FCEBEB;border-color:#A32D2D}
.opt.wrong .ltr{color:#A32D2D}
.opt.reveal-correct{background:#EAF3DE;border-color:#639922}
.opt.reveal-correct .ltr{color:#3B6D11}
.opt:disabled{cursor:default}
.multi-hint{font-size:12px;color:var(--color-text-secondary);margin-bottom:.75rem}
.submit-btn{margin-top:.75rem;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:9px 18px;cursor:pointer;font-size:14px;color:var(--color-text-primary)}
.submit-btn:hover{background:var(--color-background-secondary)}
.exp{margin-top:.9rem;padding:11px 14px;background:var(--color-background-secondary);border-left:3px solid #1D9E75;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;font-size:13px;color:var(--color-text-primary);line-height:1.6;display:none}
.exp.wrong-exp{border-left-color:#A32D2D}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
.fb{font-size:13px;font-weight:500}
.nxt{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:9px 18px;cursor:pointer;font-size:14px;color:var(--color-text-primary);display:none}
.nxt:hover{background:var(--color-background-secondary)}
.results{text-align:center;padding:2rem 0}
.big-score{font-size:52px;font-weight:500;color:var(--color-text-primary)}
.score-sub{font-size:14px;color:var(--color-text-secondary);margin-top:4px}
.score-msg{font-size:15px;color:var(--color-text-secondary);margin-top:1rem;line-height:1.7;max-width:500px;margin-left:auto;margin-right:auto}
.domain-breakdown{margin-top:1.5rem;text-align:left}
.db-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.db-name{flex:1;color:var(--color-text-primary)}
.db-bar-bg{width:120px;height:6px;background:var(--color-border-tertiary);border-radius:3px;flex-shrink:0}
.db-bar-fill{height:6px;border-radius:3px;transition:width .6s}
.db-pct{width:36px;text-align:right;color:var(--color-text-secondary);font-size:12px}
.action-row{display:flex;gap:8px;justify-content:center;margin-top:1.5rem;flex-wrap:wrap}
.act-btn{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:9px 18px;cursor:pointer;font-size:14px;color:var(--color-text-primary)}
.act-btn:hover{background:var(--color-background-secondary)}
</style>

<div class="wrap">
<h2 class="sr-only">AZ-500 Expert Practice Exam — 40 questions across all domains</h2>
<div class="header">
  <span class="header-left" id="hdr">Question 1 of 40</span>
  <span class="timer" id="tmr">90:00</span>
</div>
<div class="prog-bg"><div class="prog-fill" id="prog" style="width:0%"></div></div>
<div id="area"></div>
</div>

<script>
const Qs=[
  {d:"Identity & Access",dc:"#534AB7",db:"#EEEDFE",dt:"#3C3489",
   t:"single",
   q:"A company uses Privileged Identity Management (PIM). A user is eligible for the 'Owner' role on a subscription. The user attempts to activate the role but the activation button is greyed out. The user has MFA registered. What is the MOST likely cause?",
   opts:["The user does not have an Entra ID P2 license","The role requires approval and no approver has been configured yet — activations pending approval are blocked until an approver accepts","The subscription has a deny assignment blocking PIM activations","The user's MFA method is not FIDO2-compliant"],
   ans:[1],
   exp:"In PIM, if a role requires approval and no approver is configured (or all approvers are inactive), the activation request is created but cannot auto-approve — effectively blocking activation. License, deny assignments, and MFA method are not the cause here."
  },
  {d:"Identity & Access",dc:"#534AB7",db:"#EEEDFE",dt:"#3C3489",
   t:"single",
   q:"You need to ensure that service accounts authenticating to Azure AD use certificate-based credentials that auto-rotate every 30 days, without storing any secret in code or config files. Which solution meets all requirements?",
   opts:["App Registration with client secret, rotated via Key Vault policy","User-assigned Managed Identity with a certificate uploaded to Key Vault","System-assigned Managed Identity — Azure manages credentials automatically, no secrets stored anywhere","Service Principal with a self-signed certificate stored in Azure Key Vault, rotated by a Logic App"],
   ans:[2],
   exp:"System-assigned Managed Identity is the only option where Azure fully manages credential lifecycle with zero storage of secrets. Certificates and client secrets still require management even when stored in Key Vault."
  },
  {d:"Identity & Access",dc:"#534AB7",db:"#EEEDFE",dt:"#3C3489",
   t:"multi",
   q:"Your Conditional Access policy targets all users and requires a compliant device OR a hybrid Azure AD joined device. A user connects from a personal iOS device that is Intune-enrolled and compliant, but not hybrid joined. Which TWO statements are true?",
   opts:["Access is granted because the device satisfies the 'compliant device' condition","Access is denied because the device is not hybrid Azure AD joined","The policy evaluates conditions with OR logic, so meeting one grant control is sufficient","The user must satisfy both conditions simultaneously because the policy uses AND logic"],
   ans:[0,2],
   exp:"Conditional Access grant controls listed in the same policy block use OR logic by default (unless 'Require all selected controls' is checked). A compliant Intune device satisfies the first condition, so access is granted even without hybrid join."
  },
  {d:"Identity & Access",dc:"#534AB7",db:"#EEEDFE",dt:"#3C3489",
   t:"single",
   q:"An application running in an Azure Function needs to write blobs to a Storage Account. The security team forbids any credentials in code or environment variables. The Function and Storage Account are in different subscriptions but the same tenant. What is the correct approach?",
   opts:["Create a SAS token with 1-hour expiry and store it in App Configuration","Enable a User-assigned Managed Identity on the Function App, assign it 'Storage Blob Data Contributor' on the target Storage Account","Enable System-assigned Managed Identity, then whitelist the Function's outbound IP in the Storage Account firewall","Use a Service Principal with certificate stored in a Key Vault accessible by the Function"],
   ans:[1],
   exp:"User-assigned Managed Identity works across subscriptions within the same tenant. Assigning 'Storage Blob Data Contributor' on the target Storage Account via RBAC is the correct, credential-free approach. System-assigned MI also works but User-assigned is preferred for cross-resource reuse."
  },
  {d:"Network Security",dc:"#0F6E56",db:"#E1F5EE",dt:"#085041",
   t:"single",
   q:"A VNet has Azure Firewall deployed in a dedicated AzureFirewallSubnet. VMs in Subnet-A need all outbound Internet traffic routed through the firewall. However, after adding a UDR with 0.0.0.0/0 → Azure Firewall, VMs can no longer reach Azure Monitor. What is the MOST likely cause?",
   opts:["The UDR is missing a specific route for AzureMonitor service tag","Azure Monitor requires a Private Endpoint — UDR routing is incompatible","The Azure Firewall Application Rule for *.monitor.azure.com is missing","NSG on Subnet-A is blocking outbound TCP 443 to Azure Monitor"],
   ans:[2],
   exp:"When all traffic is forced through Azure Firewall, outbound HTTPS to Azure services like Azure Monitor requires an explicit Application Rule allowing the FQDN (e.g. *.monitor.azure.com, *.ods.opinsights.azure.com). Without it, the firewall's default deny blocks the traffic."
  },
  {d:"Network Security",dc:"#0F6E56",db:"#E1F5EE",dt:"#085041",
   t:"single",
   q:"You configure a Private Endpoint for an Azure SQL Database. After deployment, developers report they can connect from inside the VNet but external partners connecting over VPN cannot resolve the private DNS name. What is the MOST likely cause?",
   opts:["The VPN gateway does not support Private Endpoint DNS","The Private DNS Zone (privatelink.database.windows.net) is linked to the VNet but not to the hub VNet used by VPN clients","The NSG on the Private Endpoint subnet is blocking port 1433","Partners must use the public FQDN — Private Endpoints are VNet-local only"],
   ans:[1],
   exp:"Private DNS Zones must be linked to every VNet whose clients need to resolve the private endpoint DNS name. If VPN clients resolve DNS via a hub VNet that lacks the Private DNS Zone link, they receive the public IP instead of the private one."
  },
  {d:"Network Security",dc:"#0F6E56",db:"#E1F5EE",dt:"#085041",
   t:"multi",
   q:"You need to implement network micro-segmentation for a 3-tier application (web, app, db) deployed across three subnets in one VNet, ensuring that the web tier can only reach the app tier on TCP 8080, and the app tier can only reach the db tier on TCP 1433. Select TWO controls you should configure.",
   opts:["Create Application Security Groups (ASGs) for each tier and reference them in NSG rules","Deploy Azure Firewall between each subnet","Add NSG inbound rules allowing the source ASG to the destination ASG on the required ports","Create a Route Table forcing inter-subnet traffic through Azure Firewall for inspection"],
   ans:[0,2],
   exp:"ASGs combined with NSG rules provide subnet-level micro-segmentation without routing through a firewall. You tag VMs with ASGs and write NSG rules referencing source/destination ASGs. Azure Firewall adds cost and latency for intra-VNet east-west traffic where NSG+ASG is sufficient."
  },
  {d:"Network Security",dc:"#0F6E56",db:"#E1F5EE",dt:"#085041",
   t:"single",
   q:"Azure DDoS Protection Standard is enabled on a VNet. A public IP attached to an Application Gateway receives a volumetric attack. Which statement accurately describes DDoS Standard behavior?",
   opts:["DDoS Standard only protects VM NICs, not Application Gateways","DDoS Standard automatically adapts mitigation thresholds per protected public IP using machine learning baselines","DDoS Standard blocks all traffic during an attack and requires manual intervention to restore service","DDoS Standard requires a WAF policy to be effective against volumetric attacks"],
   ans:[1],
   exp:"Azure DDoS Protection Standard uses adaptive tuning — it learns the normal traffic baseline for each protected public IP and automatically triggers mitigation only when anomalies are detected. It protects all public IPs in the VNet including those on Application Gateways, Load Balancers, and VMs."
  },
  {d:"VM Security",dc:"#185FA5",db:"#E6F1FB",dt:"#042C53",
   t:"single",
   q:"A VM running Windows Server has disk encryption enabled with Azure Disk Encryption (ADE). The security team discovers the BitLocker keys are stored in a Key Vault with soft-delete only (no purge protection). What risk does this introduce?",
   opts:["An attacker who compromises the Key Vault can permanently delete the encryption keys during the soft-delete retention window, after which recovery is possible but requires Microsoft support","A privileged user could purge the soft-deleted keys during the retention period, permanently destroying the ability to decrypt the disk","ADE is not compatible with soft-delete — the VM will fail to start","Disk encryption keys in Key Vault bypass soft-delete and are always immediately purgeable"],
   ans:[1],
   exp:"Without purge protection, a user with sufficient permissions can permanently purge soft-deleted keys before the retention period expires. This would permanently destroy the ability to decrypt ADE-protected disks. Purge protection prevents this by blocking purge operations during the retention window."
  },
  {d:"VM Security",dc:"#185FA5",db:"#E6F1FB",dt:"#042C53",
   t:"single",
   q:"You want to allow your operations team to RDP into production VMs only during business hours, from specific jump host IPs, with all access logged. No permanent inbound rules should exist on NSGs. Which combination achieves this?",
   opts:["JIT VM Access in Defender for Servers + approved source IP + Conditional Access time-based policy","Permanent NSG rule for RDP on port 3389 restricted to jump host IP range","Azure Bastion with IP-based access restriction in its NSG","JIT VM Access with approved source IP restriction — JIT dynamically creates time-limited NSG rules and all requests are logged in the Activity Log"],
   ans:[3],
   exp:"JIT VM Access creates temporary NSG rules for approved source IPs for a specified duration (max configurable). No permanent RDP rules exist. All activation requests are logged in Azure Activity Log. Bastion does not create NSG rules dynamically and doesn't satisfy the 'no permanent rules' requirement when combined with its subnet NSG."
  },
  {d:"VM Security",dc:"#185FA5",db:"#E6F1FB",dt:"#042C53",
   t:"single",
   q:"Microsoft Defender for Servers Plan 2 is enabled on a VM. The security team wants to detect if a critical system file (C:\\Windows\\System32\\lsass.exe) is modified. Which feature should they configure?",
   opts:["Azure Monitor alert on VM CPU metrics","File Integrity Monitoring (FIM) in Defender for Servers Plan 2","Azure Policy guest configuration","Log Analytics custom log ingestion"],
   ans:[1],
   exp:"File Integrity Monitoring (FIM) is a Defender for Servers Plan 2 feature that tracks changes to OS files, registry keys, and application files. It alerts when monitored files like lsass.exe are modified, which can indicate credential dumping attacks."
  },
  {d:"VM Security",dc:"#185FA5",db:"#E6F1FB",dt:"#042C53",
   t:"single",
   q:"A VM vulnerability scan performed by Defender for Servers reports a critical CVE on an installed application. The patch is not yet available from the vendor. What is the BEST immediate mitigation action within Azure?",
   opts:["Delete and redeploy the VM from a hardened image","Apply an Azure Policy 'deny' effect on the resource group","Use Adaptive Application Controls in Defender for Cloud to whitelist only approved executables, reducing the attack surface","Enable automatic OS patching via Azure Update Manager"],
   ans:[2],
   exp:"Adaptive Application Controls (AAC) use machine learning to define allowed applications on a VM. Blocking execution of unknown or malicious payloads targeting the vulnerable application reduces the exploitability of the CVE while a vendor patch is unavailable. OS patching does not address third-party application CVEs."
  },
  {d:"Database Security",dc:"#993C1D",db:"#FAECE7",dt:"#4A1B0C",
   t:"single",
   q:"An Azure SQL Database stores PII data. Auditors require that all SELECT queries against the 'Customers' table are logged with the actual data values returned, and that the logs are tamper-proof. Which combination meets this?",
   opts:["Azure SQL Auditing → Log Analytics workspace + immutable storage policy on the storage account","Dynamic Data Masking + SQL Auditing to a Storage Account with immutable Blob storage (WORM policy)","SQL Auditing to an immutable Azure Blob Storage account (Write-Once-Read-Many policy)","Always Encrypted + SQL Auditing to Log Analytics"],
   ans:[2],
   exp:"SQL Auditing captures all queries including SELECT statements. Storing audit logs in Azure Blob Storage with an immutable WORM (Write-Once-Read-Many) policy ensures tamper-proof retention — logs cannot be modified or deleted for the defined retention period. Log Analytics does not support WORM immutability."
  },
  {d:"Database Security",dc:"#993C1D",db:"#FAECE7",dt:"#4A1B0C",
   t:"single",
   q:"A developer accidentally committed Azure SQL Database connection strings (including passwords) to a public GitHub repository. The string was exposed for 2 hours. What are the FIRST TWO actions to take?",
   opts:["Rotate the SQL login password immediately","Enable Azure Defender for SQL to detect future leaks","Revoke and rotate the credentials, then review SQL audit logs for unauthorized access during the exposure window","Enable Transparent Data Encryption"],
   ans:[2],
   exp:"Credential rotation stops active exploitation. Reviewing audit logs determines if the credentials were actually used maliciously during the 2-hour window — critical for incident response and breach notification decisions. TDE and Defender for SQL are important controls but not immediate incident response steps."
  },
  {d:"Database Security",dc:"#993C1D",db:"#FAECE7",dt:"#4A1B0C",
   t:"single",
   q:"You need to ensure that data in specific columns of an Azure SQL Database (SSN, credit card numbers) cannot be read even by a compromised DBA with sysadmin rights. Which feature guarantees this?",
   opts:["Dynamic Data Masking with sysadmin exclusion","Row-Level Security with a security predicate","Always Encrypted with Column Master Key stored in Azure Key Vault — the DBA never has access to the CMK","Transparent Data Encryption with customer-managed key in Key Vault"],
   ans:[2],
   exp:"Always Encrypted encrypts data client-side. The Column Master Key (CMK) lives in Key Vault — the database engine and DBAs never see the plaintext. Even sysadmin cannot decrypt the data without CMK access. TDE protects at-rest storage but a DBA with server access can query plaintext. Dynamic Data Masking is bypassable by privileged users."
  },
  {d:"Database Security",dc:"#993C1D",db:"#FAECE7",dt:"#4A1B0C",
   t:"single",
   q:"Microsoft Defender for SQL generates a 'Potential SQL injection' alert. Upon investigation, you find it is a false positive from a legitimate ORM framework. What is the correct action in Defender for Cloud?",
   opts:["Disable Defender for SQL on that database","Create an alert suppression rule targeting that specific alert type and resource, with a documented justification","Delete the alert and create an exclusion in Azure Policy","Whitelist the application's IP in the SQL firewall"],
   ans:[1],
   exp:"Alert suppression rules in Defender for Cloud allow you to suppress specific alert types on specific resources (or entire subscriptions) when they are confirmed false positives. This keeps Defender for SQL active while reducing noise. Disabling Defender entirely removes all threat detection."
  },
  {d:"Key Vault & Secrets",dc:"#854F0B",db:"#FAEEDA",dt:"#412402",
   t:"single",
   q:"A Key Vault has both Access Policy model and Azure RBAC enabled simultaneously. A user has 'Key Vault Administrator' RBAC role and is also listed in an Access Policy with 'Get' permission only. What effective permissions does the user have?",
   opts:["Only 'Get' — Access Policies take precedence over RBAC","Full Key Vault Administrator permissions — RBAC takes precedence when both are enabled","The union of both: full RBAC permissions since RBAC overrides Access Policies when the RBAC authorization model is selected","Access is denied due to conflicting permission models"],
   ans:[2],
   exp:"When the Key Vault permission model is set to 'Azure role-based access control', RBAC controls access and Access Policies are ignored. If Access Policy model is selected, RBAC data-plane roles are ignored. You cannot have both active simultaneously — one model is authoritative. The question describes RBAC model being active, so RBAC wins."
  },
  {d:"Key Vault & Secrets",dc:"#854F0B",db:"#FAEEDA",dt:"#412402",
   t:"single",
   q:"An application references Key Vault secrets by version-specific URI (e.g. .../secrets/dbpassword/abc123). The security team rotates the secret and creates a new version. What happens to the application?",
   opts:["The application automatically receives the new secret value","The application continues to use the old secret version until the URI is updated — version-pinned URIs do not auto-resolve to latest","Azure Key Vault invalidates the old version automatically after rotation","The application throws an authentication error because the old version is deleted"],
   ans:[1],
   exp:"Version-specific URIs are immutable references. The application will continue to use the old secret version indefinitely unless the application is updated to reference the new version URI or uses the versionless URI (omitting the version segment), which always resolves to the latest enabled version."
  },
  {d:"Containers & AKS",dc:"#3B6D11",db:"#EAF3DE",dt:"#173404",
   t:"single",
   q:"An AKS cluster uses Azure CNI networking. A pod in namespace 'payments' must be prevented from communicating with pods in namespace 'dev', but must reach pods in namespace 'shared-services'. No other communication should be restricted. What is the correct implementation?",
   opts:["Create an NSG rule blocking inter-namespace traffic","Deploy a Network Policy that allows egress from 'payments' to 'shared-services' namespace only, with a default deny-all egress rule","Configure Azure Firewall with FQDN rules for pod DNS names","Use Pod Security Admission to restrict network access"],
   ans:[1],
   exp:"Kubernetes Network Policies (supported with Azure CNI + Calico/Azure Network Policy) control pod-to-pod traffic. A default deny-all egress policy in the 'payments' namespace combined with an explicit allow rule using namespaceSelector for 'shared-services' achieves the requirement. NSGs operate at the node/subnet level and cannot distinguish between pods."
  },
  {d:"Containers & AKS",dc:"#3B6D11",db:"#EAF3DE",dt:"#173404",
   t:"single",
   q:"Microsoft Defender for Containers detects a 'Privilege escalation using sudoers file modification' alert on a running container. What does this indicate and what is the BEST immediate response?",
   opts:["A misconfigured container image — rebuild from scratch","An attacker may have gained root in the container and modified sudoers to maintain persistence — quarantine the node, collect forensic evidence, and terminate the pod","The alert is a known false positive from Defender for Containers — suppress it","The container runtime requires an update — patch the AKS node pool"],
   ans:[1],
   exp:"Sudoers file modification inside a running container is a strong indicator of active compromise (privilege escalation / persistence). Immediate response: isolate the node (cordon in Kubernetes), collect logs/memory dump for forensics, then terminate the pod. This is a confirmed threat indicator, not a false positive."
  },
  {d:"Containers & AKS",dc:"#3B6D11",db:"#EAF3DE",dt:"#173404",
   t:"multi",
   q:"You must ensure container images deployed to AKS meet these requirements: (1) only images from your private ACR are allowed, (2) images with Critical CVEs are blocked at deploy time. Select TWO Azure-native controls that together satisfy both requirements.",
   opts:["Azure Policy for AKS: 'Kubernetes cluster containers should only use allowed images' pointing to your ACR","Microsoft Defender for Containers with continuous vulnerability assessment","Azure Policy for AKS integrated with Defender for Containers to block images with unpatched Critical CVEs at admission","Container image scanning in GitHub Actions CI pipeline only"],
   ans:[0,2],
   exp:"Azure Policy for AKS (via Gatekeeper admission controller) enforces allowed image registries. The Defender for Containers + Azure Policy integration adds vulnerability-based admission control, blocking images with Critical CVEs at deployment time. CI pipeline scanning alone doesn't enforce at the cluster admission level."
  },
  {d:"Defender for Cloud",dc:"#993556",db:"#FBEAF0",dt:"#4B1528",
   t:"single",
   q:"Your organization has 15 Azure subscriptions across 3 management groups. You need to enforce Defender for Cloud's Enhanced Security Features on all current and future subscriptions automatically. What is the MOST scalable approach?",
   opts:["Enable Defender plans on each subscription manually via the portal","Create an Azure Policy 'deployIfNotExists' to enable Defender plans, assigned at the root management group","Use Azure Blueprints to deploy Defender on each subscription","Write a PowerShell runbook that runs weekly to check and enable Defender"],
   ans:[1],
   exp:"'deployIfNotExists' Azure Policy assigned at the root management group automatically enables Defender for Cloud plans on all existing and newly created subscriptions. This is the most scalable, governance-aligned approach. Manual configuration and scripts don't handle new subscriptions automatically."
  },
  {d:"Defender for Cloud",dc:"#993556",db:"#FBEAF0",dt:"#4B1528",
   t:"single",
   q:"Defender for Cloud shows a 'Storage account allows public blob access' recommendation. The storage account hosts a static website that requires public access. What is the correct action?",
   opts:["Disable the recommendation globally for all storage accounts","Exempt the specific resource from the recommendation with justification (waiver or mitigated), documenting the business reason","Delete the recommendation — it is a false positive","Enable anonymous access on all blob containers to resolve the misconfiguration"],
   ans:[1],
   exp:"Exemptions in Defender for Cloud allow you to exclude specific resources from recommendations when there is a legitimate business reason (waiver) or when compensating controls are in place (mitigated). This preserves the recommendation for other storage accounts while acknowledging the intentional configuration."
  },
  {d:"Defender for Cloud",dc:"#993556",db:"#FBEAF0",dt:"#4B1528",
   t:"single",
   q:"Your Secure Score dropped from 72% to 58% overnight. You need to identify which recommendations caused the drop. Which Defender for Cloud feature provides a time-based view of Secure Score changes?",
   opts:["Security alerts timeline","Secure Score over time workbook in the Defender for Cloud Workbooks gallery","Azure Monitor metrics for SecureScore resource type","Regulatory compliance dashboard"],
   ans:[1],
   exp:"The 'Secure Score over time' built-in workbook in Defender for Cloud (under Workbooks) provides a historical graph of score changes and can correlate drops with specific recommendation state changes. Security alerts are threat-focused, not posture-focused."
  },
  {d:"Defender for Cloud",dc:"#993556",db:"#FBEAF0",dt:"#4B1528",
   t:"single",
   q:"A Defender for Cloud alert 'Suspicious PowerShell activity' fires on a VM. Investigation shows the alert fires every night at 2 AM from a legitimate backup script. You want to suppress only this alert on this VM, only between 1:30 AM and 3 AM. What do you configure?",
   opts:["Delete the backup script and recreate it with obfuscation","Create a suppression rule scoped to the VM resource, for alert type 'Suspicious PowerShell activity', with a time-window condition","Disable Defender for Servers on that VM","Add the script to Windows Defender exclusions on the OS level"],
   ans:[1],
   exp:"Defender for Cloud suppression rules support scoping by resource, alert type, and time window. This allows surgical suppression of known false positives without disabling protection. OS-level exclusions affect Defender Antivirus, not Defender for Cloud alerts."
  },
  {d:"Microsoft Sentinel",dc:"#185FA5",db:"#E6F1FB",dt:"#042C53",
   t:"single",
   q:"You need to detect when the same user account logs in successfully from two different countries within 10 minutes (impossible travel). Which Sentinel Analytics Rule type and KQL technique is MOST appropriate?",
   opts:["Microsoft Security rule with entity mapping","Scheduled query rule using KQL with join or summarize to correlate two SigninLogs events for the same user within a 10-minute window, flagging location changes","NRT (Near Real Time) rule on a custom log","Fusion rule — impossible travel is a built-in Fusion scenario"],
   ans:[1],
   exp:"A Scheduled query rule with KQL is the correct approach for custom correlation logic. You'd use 'summarize' or a self-join on SigninLogs, grouping by user, filtering events within a 10-minute window and comparing country codes. Fusion rules are pre-built by Microsoft and cannot be customized. NRT rules don't support complex join operations."
  },
  {d:"Microsoft Sentinel",dc:"#185FA5",db:"#E6F1FB",dt:"#042C53",
   t:"single",
   q:"A Sentinel Analytics Rule fires 200 alerts per day for the same recurring event pattern. The SOC team is overwhelmed. Without disabling the rule, what is the BEST way to reduce alert volume while retaining detection capability?",

let cur=0,score=0,domScores={},domTotal={},answered=false,selectedOpts=new Set();
let timerSec=90*60,timerInt;

Qs.forEach(q=>{
  if(!domTotal[q.d])domTotal[q.d]=0;
  domTotal[q.d]++;
  if(!domScores[q.d])domScores[q.d]=0;
});

function startTimer(){
  timerInt=setInterval(()=>{
    timerSec--;
    const m=Math.floor(timerSec/60),s=timerSec%60;
    const el=document.getElementById('tmr');
    if(el){el.textContent=m+':'+(s<10?'0':'')+s;if(timerSec<300)el.classList.add('warn');}
    if(timerSec<=0){clearInterval(timerInt);showResults();}
  },1000);
}

function render(){
  answered=false;selectedOpts=new Set();
  const p=document.getElementById('prog');
  const h=document.getElementById('hdr');
  if(p)p.style.width=Math.round((cur/Qs.length)*100)+'%';
  if(h)h.textContent='Question '+(cur+1)+' of '+Qs.length;
  if(cur>=Qs.length){showResults();return;}
  const q=Qs[cur];
  const letters=['A','B','C','D','E'];
  const isMulti=q.t==='multi';
  document.getElementById('area').innerHTML=`
    <span class="domain-badge" style="background:${q.db};color:${q.dt}">${q.d}</span>
    <p class="q-type">${isMulti?'Multiple choice — select all that apply':'Single answer'}</p>
    <p class="q-text">${q.q}</p>
    ${q.note?`<div class="q-note">${q.note}</div>`:''}
    ${isMulti?'<p class="multi-hint">Select all correct answers, then click Submit.</p>':''}
    <div class="opts" id="opts">
      ${q.opts.map((o,i)=>`<button class="opt" id="o${i}" onclick="pick(${i})">${isMulti?`<input type="checkbox" id="cb${i}" style="margin-top:3px;flex-shrink:0" onclick="event.stopPropagation()"> `:'<span class="ltr">'+letters[i]+'.</span>'}<span>${o}</span></button>`).join('')}
    </div>
    ${isMulti?`<button class="submit-btn" id="sbtn" onclick="submitMulti()">Submit answer</button>`:''}
    <div class="exp" id="exp">${q.exp}</div>
    <div class="nav">
      <span class="fb" id="fb"></span>
      <button class="nxt" id="nxt" onclick="next()">${cur+1<Qs.length?'Next question →':'See results →'}</button>
    </div>`;
}

function pick(i){
  const q=Qs[cur];
  if(q.t==='multi'){
    if(answered)return;
    const cb=document.getElementById('cb'+i);
    if(selectedOpts.has(i)){selectedOpts.delete(i);if(cb)cb.checked=false;}
    else{selectedOpts.add(i);if(cb)cb.checked=true;}
    return;
  }
  if(answered)return;
  answered=true;
  const correct=q.ans.includes(i);
  if(correct){score++;domScores[q.d]++;}
  document.querySelectorAll('.opt').forEach((b,idx)=>{
    b.disabled=true;
    if(q.ans.includes(idx))b.classList.add(correct||idx!==i?'reveal-correct':'reveal-correct');
    if(idx===i&&!correct)b.classList.add('wrong');
    if(q.ans.includes(idx))b.classList.add('correct');
  });
  const exp=document.getElementById('exp');
  if(exp){exp.style.display='block';if(!correct)exp.classList.add('wrong-exp');}
  const fb=document.getElementById('fb');
  if(fb){fb.textContent=correct?'Correct':'Incorrect';fb.style.color=correct?'#3B6D11':'#A32D2D';}
  const nxt=document.getElementById('nxt');
  if(nxt)nxt.style.display='block';
}

function submitMulti(){
  if(answered)return;
  answered=true;
  const q=Qs[cur];
  const correctSet=new Set(q.ans);
  const userSet=selectedOpts;
  const isCorrect=[...correctSet].every(a=>userSet.has(a))&&[...userSet].every(a=>correctSet.has(a));
  if(isCorrect){score++;domScores[q.d]++;}
  document.querySelectorAll('.opt').forEach((b,idx)=>{
    b.disabled=true;
    if(correctSet.has(idx))b.classList.add('correct');
    else if(userSet.has(idx)&&!correctSet.has(idx))b.classList.add('wrong');
  });
  const sbtn=document.getElementById('sbtn');
  if(sbtn)sbtn.style.display='none';
  const exp=document.getElementById('exp');
  if(exp){exp.style.display='block';if(!isCorrect)exp.classList.add('wrong-exp');}
  const fb=document.getElementById('fb');
  if(fb){fb.textContent=isCorrect?'Correct':'Incorrect — check highlighted answers';fb.style.color=isCorrect?'#3B6D11':'#A32D2D';}
  const nxt=document.getElementById('nxt');
  if(nxt)nxt.style.display='block';
}

function next(){cur++;render();}

function showResults(){
  clearInterval(timerInt);
  const pct=Math.round((score/Qs.length)*100);
  const pass=pct>=70;
  const domColors={'Identity & Access':'#534AB7','Network Security':'#0F6E56','VM Security':'#185FA5','Database Security':'#993C1D','Key Vault & Secrets':'#854F0B','Containers & AKS':'#3B6D11','Defender for Cloud':'#993556','Microsoft Sentinel':'#185FA5','Governance & Compliance':'#888780'};
  const breakdown=Object.keys(domTotal).map(d=>{
    const p=domTotal[d]>0?Math.round((domScores[d]/domTotal[d])*100):0;
    const col=domColors[d]||'#534AB7';
    return `<div class="db-row">
      <span class="db-name">${d}</span>
      <div class="db-bar-bg"><div class="db-bar-fill" style="width:${p}%;background:${col}"></div></div>
      <span class="db-pct">${p}%</span>
    </div>`;
  }).join('');
  document.getElementById('prog').style.width='100%';
  document.getElementById('hdr').textContent='Exam complete';
  document.getElementById('tmr').textContent='Done';
  document.getElementById('area').innerHTML=`
    <div class="results">
      <div class="big-score">${score}/${Qs.length}</div>
      <div class="score-sub">${pct}% — ${pass?'PASS (≥70%)':'FAIL (<70%)'}</div>
      <div class="score-msg">${pass?'Great performance! You are tracking well for the real exam. Focus on any domains below 70%.':'Keep pushing. Review the explanations for missed questions and target the weakest domains below.'}</div>
      <div class="domain-breakdown">${breakdown}</div>
      <div class="action-row">
        <button class="act-btn" onclick="location.reload()">Restart exam ↻</button>
        <button class="act-btn" onclick="sendPrompt('Donne-moi des explications détaillées et des ressources de révision pour les domaines où j\\'ai le plus de lacunes dans l\\'AZ-500')">Analyse my weak areas ↗</button>
      </div>
    </div>`;
}

startTimer();
render();
</script>
